<!doctype html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5805382270991059"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>
      TimeBridge - Free Global Time Coordination Tool | No Login Required
    </title>
    <meta
      name="description"
      content="Schedule events across time zones effortlessly with TimeBridge. No login required - just create a link and share. Perfect for global teams, friends, and casual coordination."
    />
    <meta
      name="keywords"
      content="time zone converter, global scheduling, meeting scheduler, time coordination, cross-timezone meeting, no-login scheduler, free scheduling tool"
    />
    <meta name="author" content="TimeBridge" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Tags for Social Sharing -->
    <meta
      property="og:title"
      content="TimeBridge - Global Time Coordination Made Simple"
    />
    <meta
      property="og:description"
      content="Schedule events across time zones effortlessly. No login required - just create a link and share."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://time-brige.vercel.app" />
    <meta
      property="og:image"
      content="https://time-brige.vercel.app/og-image.png"
    />
    <meta property="og:site_name" content="TimeBridge" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="TimeBridge - Global Time Coordination Made Simple"
    />
    <meta
      name="twitter:description"
      content="Schedule events across time zones effortlessly. No login required - just create a link and share."
    />
    <meta
      name="twitter:image"
      content="https://time-brige.vercel.app/twitter-image.png"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://time-brige.vercel.app" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Vercel Analytics -->
    <script src="https://cdn.vercel-analytics.com/script.js" defer></script>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TimeBridge",
        "description": "Free global time coordination tool. Schedule events across time zones effortlessly without login.",
        "url": "https://time-brige.vercel.app",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "No login required",
          "Automatic timezone conversion",
          "Live countdown timer",
          "Google Calendar integration",
          "iCal download",
          "URL-based event sharing"
        ]
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
      }
      .gradient-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .countdown-digit {
        background: rgba(99, 102, 241, 0.8);
        backdrop-filter: blur(10px);
      }

      /* iOS-specific fixes for datetime input alignment */
      @supports (-webkit-touch-callout: none) {
        input[type="datetime-local"] {
          -webkit-appearance: none;
          appearance: none;
          padding: 12px 16px;
          text-align: left;
        }
      }

      /* General datetime input alignment fix */
      input[type="datetime-local"]::-webkit-calendar-picker-indicator {
        margin-left: auto;
      }
    </style>
  </head>
  <body class="min-h-screen gradient-bg">
    <div class="container mx-auto px-4 py-8">
      <!-- Header -->
      <header class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-2">
          TimeBridge
        </h1>
        <p class="text-white/80 text-lg">
          Global time coordination, made simple
        </p>
      </header>

      <!-- Creator Section -->
      <div id="creator-section" class="max-w-xl mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
          <h2 class="text-2xl font-bold text-gray-800 mb-6">
            Create a Time Link
          </h2>

          <div class="space-y-6">
            <!-- Event Title Input -->
            <div>
              <label
                for="event-title"
                class="block text-sm font-medium text-gray-700 mb-2"
                >What are you planning?</label
              >
              <input
                type="text"
                id="event-title"
                placeholder="e.g., Coachella Live Stream, Weekly Sync, Gaming Tournament"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              />
            </div>

            <!-- Date and Time Picker -->
            <div>
              <label
                for="event-datetime"
                class="block text-sm font-medium text-gray-700 mb-2"
                >When is it happening?</label
              >
              <input
                type="datetime-local"
                id="event-datetime"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition"
              />
            </div>

            <!-- Generate Button -->
            <button
              id="generate-btn"
              onclick="generateLink()"
              class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 px-6 rounded-lg hover:from-purple-700 hover:to-indigo-700 transition transform hover:scale-105 shadow-lg"
            >
              Generate Link
            </button>
          </div>
        </div>
      </div>

      <!-- Receiver Section (Hidden by default) -->
      <div id="receiver-section" class="max-w-xl mx-auto hidden">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
          <div class="text-center">
            <!-- Event Title -->
            <h2
              id="display-title"
              class="text-3xl font-bold text-gray-800 mb-4"
            ></h2>

            <!-- Local Time -->
            <div class="mb-6">
              <p class="text-gray-600 mb-2">This happens at</p>
              <p
                id="display-time"
                class="text-2xl font-semibold text-purple-600"
              ></p>
              <p id="display-timezone" class="text-gray-500"></p>
            </div>

            <!-- Countdown Timer -->
            <div class="mb-8">
              <p class="text-gray-600 mb-4">Starts in:</p>
              <div class="flex justify-center gap-4">
                <div class="countdown-digit rounded-lg p-4 min-w-[80px]">
                  <span
                    id="countdown-days"
                    class="text-3xl font-bold text-white"
                    >00</span
                  >
                  <p class="text-white/70 text-sm">Days</p>
                </div>
                <div class="countdown-digit rounded-lg p-4 min-w-[80px]">
                  <span
                    id="countdown-hours"
                    class="text-3xl font-bold text-white"
                    >00</span
                  >
                  <p class="text-white/70 text-sm">Hours</p>
                </div>
                <div class="countdown-digit rounded-lg p-4 min-w-[80px]">
                  <span
                    id="countdown-minutes"
                    class="text-3xl font-bold text-white"
                    >00</span
                  >
                  <p class="text-white/70 text-sm">Minutes</p>
                </div>
                <div class="countdown-digit rounded-lg p-4 min-w-[80px]">
                  <span
                    id="countdown-seconds"
                    class="text-3xl font-bold text-white"
                    >00</span
                  >
                  <p class="text-white/70 text-sm">Seconds</p>
                </div>
              </div>
            </div>

            <!-- Add to Calendar Buttons -->
            <div class="space-y-3">
              <button
                onclick="addToGoogleCalendar()"
                class="w-full bg-blue-500 text-white font-semibold py-3 px-6 rounded-lg hover:bg-blue-600 transition flex items-center justify-center gap-2"
              >
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"
                  />
                </svg>
                Add to Google Calendar
              </button>
              <button
                onclick="downloadICS()"
                class="w-full bg-gray-700 text-white font-semibold py-3 px-6 rounded-lg hover:bg-gray-800 transition flex items-center justify-center gap-2"
              >
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"
                  />
                </svg>
                Download iCal File
              </button>
            </div>

            <!-- Create New Link -->
            <button
              onclick="createNew()"
              class="mt-6 text-purple-600 hover:text-purple-800 transition font-medium"
            >
              Create a new time link
            </button>
          </div>
        </div>
      </div>

      <!-- Generated Link Modal -->
      <div
        id="link-modal"
        class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50"
      >
        <div class="bg-white rounded-2xl p-8 max-w-md mx-4 shadow-2xl">
          <h3 class="text-xl font-bold text-gray-800 mb-4">
            Your Time Link is Ready!
          </h3>
          <div class="bg-gray-100 rounded-lg p-4 mb-4">
            <input
              type="text"
              id="generated-link"
              readonly
              class="w-full bg-transparent text-purple-600 font-medium outline-none"
            />
          </div>
          <button
            onclick="copyLink()"
            class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-3 px-6 rounded-lg hover:from-purple-700 hover:to-indigo-700 transition mb-3"
          >
            Copy Link
          </button>
          <button
            onclick="closeModal()"
            class="w-full bg-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-lg hover:bg-gray-300 transition"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script>
      // Initialize Day.js plugins
      dayjs.extend(dayjs_plugin_utc);
      dayjs.extend(dayjs_plugin_timezone);

      let eventData = null;
      let countdownInterval = null;

      // Set default datetime to 1 hour from now for better UX
      document.addEventListener("DOMContentLoaded", () => {
        const now = dayjs().add(1, "hour");
        const datetimeInput = document.getElementById("event-datetime");
        datetimeInput.value = now.format("YYYY-MM-DDTHH:mm");

        // Check if URL has hash with event data
        checkUrlHash();
      });

      function checkUrlHash() {
        const hash = window.location.hash;
        if (hash && hash.startsWith("#event-")) {
          const encodedData = hash.replace("#event-", "");
          try {
            const decoded = JSON.parse(atob(encodedData));
            eventData = decoded;
            showReceiverSection();
          } catch (e) {
            console.error("Invalid event data in URL");
          }
        }
      }

      function generateLink() {
        const title = document.getElementById("event-title").value.trim();
        const datetime = document.getElementById("event-datetime").value;

        if (!title || !datetime) {
          alert("Please fill in both the event title and date/time");
          return;
        }

        // Parse the datetime as local time and get UTC timestamp
        const eventDate = dayjs(datetime);
        const timestamp = eventDate.valueOf();

        eventData = {
          title: title,
          timestamp: timestamp,
        };

        const encodedData = btoa(JSON.stringify(eventData));
        const link = `${window.location.origin}${window.location.pathname}#event-${encodedData}`;

        document.getElementById("generated-link").value = link;
        document.getElementById("link-modal").classList.remove("hidden");
      }

      async function copyLink() {
        const linkInput = document.getElementById("generated-link");
        try {
          await navigator.clipboard.writeText(linkInput.value);
          alert("Link copied to clipboard!");
        } catch (err) {
          // Fallback for older browsers
          linkInput.select();
          document.execCommand("copy");
          alert("Link copied to clipboard!");
        }
      }

      function closeModal() {
        document.getElementById("link-modal").classList.add("hidden");
      }

      function showReceiverSection() {
        document.getElementById("creator-section").classList.add("hidden");
        document.getElementById("receiver-section").classList.remove("hidden");

        // The timestamp is in milliseconds since epoch, treat it as UTC
        const eventDate = dayjs(eventData.timestamp);
        const userTimezone = dayjs.tz.guess();

        document.getElementById("display-title").textContent = eventData.title;
        document.getElementById("display-time").textContent = eventDate
          .tz(userTimezone)
          .format("MMMM D, YYYY [at] h:mm A");
        document.getElementById("display-timezone").textContent =
          `(${userTimezone.replace("_", " ")})`;

        startCountdown(eventDate);
      }

      function startCountdown(eventDate) {
        if (countdownInterval) {
          clearInterval(countdownInterval);
        }

        function updateCountdown() {
          const now = dayjs();
          const diff = eventDate.diff(now);

          if (diff <= 0) {
            clearInterval(countdownInterval);
            document.getElementById("countdown-days").textContent = "00";
            document.getElementById("countdown-hours").textContent = "00";
            document.getElementById("countdown-minutes").textContent = "00";
            document.getElementById("countdown-seconds").textContent = "00";

            // Show "Event started" message
            document.querySelector(
              ".countdown-digit",
            ).parentElement.previousElementSibling.textContent =
              "Event started!";
            return;
          }

          const days = Math.floor(diff / (1000 * 60 * 60 * 24));
          const hours = Math.floor(
            (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          );
          const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((diff % (1000 * 60)) / 1000);

          document.getElementById("countdown-days").textContent = String(
            days,
          ).padStart(2, "0");
          document.getElementById("countdown-hours").textContent = String(
            hours,
          ).padStart(2, "0");
          document.getElementById("countdown-minutes").textContent = String(
            minutes,
          ).padStart(2, "0");
          document.getElementById("countdown-seconds").textContent = String(
            seconds,
          ).padStart(2, "0");
        }

        updateCountdown();
        countdownInterval = setInterval(updateCountdown, 1000);
      }

      function addToGoogleCalendar() {
        const eventDate = dayjs(eventData.timestamp);
        const endDate = eventDate.add(1, "hour");

        const title = encodeURIComponent(eventData.title);
        // Format dates in UTC for Google Calendar
        const dates = `${eventDate.utc().format("YYYYMMDDTHHmmss")}Z/${endDate.utc().format("YYYYMMDDTHHmmss")}Z`;

        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}`;
        window.open(url, "_blank");
      }

      function downloadICS() {
        const eventDate = dayjs(eventData.timestamp);
        const endDate = eventDate.add(1, "hour");

        const icsContent = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//TimeBridge//EN",
          "BEGIN:VEVENT",
          `UID:${Date.now()}@timebridge.com`,
          `DTSTAMP:${dayjs().utc().format("YYYYMMDDTHHmmss")}Z`,
          `DTSTART:${eventDate.utc().format("YYYYMMDDTHHmmss")}Z`,
          `DTEND:${endDate.utc().format("YYYYMMDDTHHmmss")}Z`,
          `SUMMARY:${eventData.title}`,
          "END:VEVENT",
          "END:VCALENDAR",
        ].join("\r\n");

        const blob = new Blob([icsContent], { type: "text/calendar" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "event.ics";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function createNew() {
        window.location.hash = "";
        window.location.reload();
      }
    </script>
  </body>
</html>
